name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Analyze commits and determine version
        id: version
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}

          # Split version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Analyze commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format=%s)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --format=%s)
          fi

          # Determine version bump
          BUMP="patch"
          while IFS= read -r commit; do
            if [[ "$commit" =~ ^(feat!|fix!|BREAKING CHANGE) ]] || [[ "$commit" =~ "BREAKING CHANGE:" ]]; then
              BUMP="major"
              break
            elif [[ "$commit" =~ ^feat ]]; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
          done <<< "$COMMITS"

          # Calculate new version
          case $BUMP in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "Current version: $CURRENT_VERSION"
          echo "Bump type: $BUMP"
          echo "New version: $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

      - name: Resolve release version (catch-up aware)
        id: update_version
        run: |
          # git-first model: the version lives in package.json. npm is a publish
          # target that must CATCH UP to that version, never skip past it.
          #
          #   - If package.json's version is NOT yet on npm, release THAT exact
          #     version (no bump). A previous failed publish is retried with the
          #     same number on the next run, so npm converges to git instead of
          #     orphaning versions (the bug that left npm on 1.13.16 while git
          #     raced to 1.13.20).
          #   - Only when the current version is already on npm do we bump to the
          #     next version computed from the commits since the last tag.
          PKG_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION=${{ steps.version.outputs.new_version }}
          echo "package.json version: $PKG_VERSION"
          echo "Calculated next version: $NEW_VERSION"

          if npm view "@monochrome-edge/ui@${PKG_VERSION}" version >/dev/null 2>&1; then
            PKG_PUBLISHED=true
          else
            PKG_PUBLISHED=false
          fi
          echo "package.json version already on npm: $PKG_PUBLISHED"

          if [ "$PKG_PUBLISHED" = "false" ]; then
            # Catch-up: ship the existing, not-yet-published version as-is.
            echo "Catch-up release of $PKG_VERSION (npm is behind git)"
            echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "skip_release=false" >> $GITHUB_OUTPUT
          else
            # Current version is live on npm. Release a new one only if commits warrant it.
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            if [ "$LATEST_TAG" != "v0.0.0" ]; then
              NEW_COMMITS=$(git rev-list ${LATEST_TAG}..HEAD --count)
            else
              NEW_COMMITS=$(git rev-list HEAD --count)
            fi

            if [ "$NEW_COMMITS" -eq 0 ]; then
              echo "No new commits since last tag - skipping release"
              echo "skip_release=true" >> $GITHUB_OUTPUT
            else
              echo "Bumping to $NEW_VERSION"
              npm version $NEW_VERSION --no-git-tag-version
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add package.json package-lock.json
              git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
              git push origin main
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
              echo "skip_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog
        id: changelog
        if: steps.update_version.outputs.skip_release != 'true'
        run: |
          # Use the version actually being released (catch-up or bumped).
          NEW_VERSION=${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "# Changelog for v${NEW_VERSION}" > CHANGELOG_TEMP.md
          echo "" >> CHANGELOG_TEMP.md

          if [ -z "$LATEST_TAG" ]; then
            git log --format="- %s (%h)" >> CHANGELOG_TEMP.md
          else
            git log ${LATEST_TAG}..HEAD --format="- %s (%h)" >> CHANGELOG_TEMP.md
          fi

          # Categorize changes
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if grep -q "^- feat" CHANGELOG_TEMP.md; then
            echo "### ✨ Features" >> CHANGELOG.md
            grep "^- feat" CHANGELOG_TEMP.md | sed 's/^- feat:/- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if grep -q "^- fix" CHANGELOG_TEMP.md; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            grep "^- fix" CHANGELOG_TEMP.md | sed 's/^- fix:/- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if grep -q "^- docs" CHANGELOG_TEMP.md; then
            echo "### 📚 Documentation" >> CHANGELOG.md
            grep "^- docs" CHANGELOG_TEMP.md | sed 's/^- docs:/- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if grep -q "^- chore" CHANGELOG_TEMP.md; then
            echo "### 🔧 Chores" >> CHANGELOG.md
            grep "^- chore" CHANGELOG_TEMP.md | sed 's/^- chore:/- /' >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Set multiline output
          {
            echo 'changelog<<EOF'
            cat CHANGELOG.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Build
        if: steps.update_version.outputs.skip_release != 'true'
        run: npm run build

      - name: Check if version exists on npm
        if: steps.update_version.outputs.skip_release != 'true'
        id: check_npm
        run: |
          VERSION=${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}
          if npm view @monochrome-edge/ui@${VERSION} version 2>/dev/null; then
            echo "Version ${VERSION} already exists on npm"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} does not exist on npm"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # No continue-on-error: a failed npm publish MUST turn the run red. Silently
      # masking it is what let npm stall on 1.13.16 for months while git advanced.
      # NPM_TOKEN must be an automation / granular token with "bypass 2FA" enabled.
      - name: Publish to npm
        if: steps.update_version.outputs.skip_release != 'true' && steps.check_npm.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node for GitHub Packages
        if: steps.update_version.outputs.skip_release != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@1eedaegon"

      - name: Check if version exists on GitHub Packages
        if: steps.update_version.outputs.skip_release != 'true'
        id: check_github
        run: |
          VERSION=${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}
          if npm view @1eedaegon/monochrome-edge@${VERSION} version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "Version ${VERSION} already exists on GitHub Packages"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} does not exist on GitHub Packages"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish to GitHub Packages
        if: steps.update_version.outputs.skip_release != 'true' && steps.check_github.outputs.exists != 'true'
        run: |
          # Temporarily modify package.json for GitHub Packages
          npm pkg set name="@1eedaegon/monochrome-edge"

          # Publish to GitHub Packages
          npm publish --access public

          # Restore original name
          npm pkg set name="@monochrome-edge/ui"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Tag + GitHub Release run ONLY after npm publish succeeded (publish has no
      # continue-on-error, so a failure aborts the job before here). This keeps
      # git tags/releases in lockstep with what actually shipped to npm — no
      # orphan tags pointing at versions that never published.
      - name: Create and push tag
        if: steps.update_version.outputs.skip_release != 'true'
        run: |
          VERSION=${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}

          # Idempotent: recreate the tag if a prior attempt left one behind.
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag -d "v${VERSION}"
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}"; then
            git push origin ":refs/tags/v${VERSION}"
          fi
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.update_version.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}
          name: Release v${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge jsDelivr cache
        if: steps.update_version.outputs.skip_release != 'true' && success()
        run: |
          # Wait for npm to propagate (increased to 60s for better CDN propagation)
          sleep 60

          VERSION="${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}"

          # Purge all critical files for the new version
          echo "Purging jsDelivr cache for version $VERSION..."
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@${VERSION}/dist/monochrome.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@${VERSION}/dist/warm-theme.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@${VERSION}/dist/cold-theme.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@${VERSION}/dist/index.esm.js" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@${VERSION}/dist/index.js" || true

          # Purge latest tag for all files
          echo "Purging jsDelivr cache for @latest..."
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@latest/dist/monochrome.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@latest/dist/warm-theme.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@latest/dist/cold-theme.min.css" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@latest/dist/index.esm.js" || true
          curl "https://purge.jsdelivr.net/npm/@monochrome-edge/ui@latest/dist/index.js" || true

          echo "jsDelivr cache purge completed"
        continue-on-error: true

      - name: Comment on PR (if triggered by PR merge)
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.update_version.outputs.version || steps.version.outputs.new_version }}';
            const bump = '${{ steps.version.outputs.bump_type }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Released in v${version} (${bump} version bump)`
            });
